<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>BOSS 狩獵管理平台</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #10b981; --warning: #fbbf24; --info: #38bdf8; --fixed: #f472b6; --danger: #ef4444; --event: #8b5cf6; --gray: #64748b;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; font-size: 14px; }
        .container { max-width: 1150px; margin: 0 auto; background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-title { font-size: 18px; font-weight: bold; padding: 10px; border-left: 4px solid var(--accent); margin: 20px 0 10px; background: rgba(255,255,255,0.05); }
        .event-title { border-left-color: var(--event); color: var(--event); }
        
        .grid-header { display: grid; grid-template-columns: 1.8fr 1.2fr 1.5fr 3fr; padding: 10px 15px; color: var(--gray); font-weight: bold; border-bottom: 2px solid #334155; }
        .boss-row { display: grid; grid-template-columns: 1.8fr 1.2fr 1.5fr 3fr; padding: 12px 15px; border-bottom: 1px solid #334155; align-items: center; transition: 0.2s; }
        .boss-row:hover { background: rgba(255,255,255,0.03); }
        
        .boss-name { font-weight: bold; color: var(--info); }
        .countdown { font-family: monospace; font-weight: bold; font-size: 16px; }
        .status-ready { color: var(--warning); }
        .status-wait { color: var(--accent); }
        
        .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
        button { 
            flex: 1; background: transparent; border: 1px solid var(--accent); color: var(--accent); 
            padding: 6px 4px; border-radius: 4px; cursor: pointer; font-size: 11px; white-space: nowrap; transition: 0.2s;
        }
        button:hover { background: var(--accent); color: white; }
        button.skip-btn { border-color: var(--danger); color: var(--danger); }
        button.skip-btn:hover { background: var(--danger); color: white; }
        button.fix-btn { border-color: var(--gray); color: var(--gray); }
        button.fix-btn:hover { background: var(--gray); color: white; }
        button.back-btn { border-color: #fb923c; color: #fb923c; }
        button.back-btn:hover { background: #fb923c; color: white; }

        button.time-btn { flex: none; border-color: var(--fixed); color: var(--fixed); min-width: 65px; margin-bottom: 2px; }
        button.time-btn.done { border-color: var(--gray); color: var(--gray); background: rgba(255,255,255,0.1); }
        
        #event-section { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; color: var(--gray); margin-bottom: 20px; font-weight: bold; color: var(--warning); font-size: 16px;">
        📢 BOSS 狩獵管理平台
    </div>

    <div id="event-section">
        <div class="section-title event-title">🔥 限時活動 (至 5/6 止)</div>
        <div class="grid-header">
            <div>活動首領</div><div>預計重生</div><div>倒數計時</div><div>操作</div>
        </div>
        <div id="event-boss-list"></div>
    </div>
    
    <div class="section-title">野外首領 (週期重生)</div>
    <div class="grid-header">
        <div>首領名稱</div><div>預計重生</div><div>倒數計時</div><div>操作選項</div>
    </div>
    <div id="wild-boss-list"></div>

    <div class="section-title">固定重生首領 (點擊時間標記紀錄)</div>
    <div class="grid-header" style="grid-template-columns: 2fr 3fr 1.2fr;">
        <div>首領名稱</div><div>重生時段 (點擊紀錄)</div><div>備註</div>
    </div>
    <div id="fixed-boss-list"></div>
</div>

<script>
// ⚠️ 已經自動幫你帶入你專屬的 Firebase 金鑰
const firebaseConfig = {
    apiKey: "AIzaSyAtoQ0h-0s9hZPOyIswNRgyp36V6iKvha0",
    authDomain: "boss-d6c8e.firebaseapp.com",
    databaseURL: "https://boss-d6c8e-default-rtdb.firebaseio.com", // 自動補齊的資料庫網址
    projectId: "boss-d6c8e",
    storageBucket: "boss-d6c8e.firebasestorage.app",
    messagingSenderId: "958955342914",
    appId: "1:958955342914:web:87ddab42ee59b7904d71db",
    measurementId: "G-2L2CMM5Y14"
};

// 初始化 Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const EVENT_END_DATE = new Date("2026-05-06T00:00:00").getTime();

const wildConfig = [
    { name: "浮士德", cycle: 60 }, { name: "伊弗利特", cycle: 120 }, { name: "大腳瑪幽", cycle: 180 },
    { name: "綠王", cycle: 120 }, { name: "紅王", cycle: 120 }, { name: "巨型蠕蟲", cycle: 120 },
    { name: "四色", cycle: 120 }, { name: "86飛龍", cycle: 120 }, { name: "83飛龍", cycle: 180 },
    { name: "85飛龍", cycle: 180 }, { name: "大黑長者", cycle: 180 }, { name: "巨大鱷魚", cycle: 180 },
    { name: "強盜頭目", cycle: 180 }, { name: "樹精", cycle: 180 }, { name: "曼波兔王", cycle: 180 },
    { name: "守護螞蟻", cycle: 180 }, { name: "賽尼斯分身", cycle: 180 }, { name: "死亡騎士", cycle: 240 },
    { name: "蜘蛛", cycle: 240 }, { name: "奈克諾斯", cycle: 240 }, { name: "巨大飛龍", cycle: 360 },
    { name: "惡魔監視者", cycle: 360 }, { name: "貝里斯", cycle: 360 }, { name: "烏勒庫斯", cycle: 360 },
    { name: "卡司特", cycle: 450 }, { name: "變形怪首領", cycle: 420 }, { name: "不死鳥", cycle: 480 },
    { name: "力卡溫", cycle: 480 }, { name: "古代巨人", cycle: 510 }, { name: "克特", cycle: 600 }
];

const eventConfig = [{ name: "【活動】死亡騎士", cycle: 120, id: "event_dk" }];

const fixedConfig = [
    { name: "奇岩地監 1F", times: ["06:00", "12:00", "18:00", "00:00"] },
    { name: "奇岩地監 2F", times: ["07:00", "14:00", "21:00"] },
    { name: "魔法師", times: ["01:00", "03:00", "05:00", "07:00", "09:00", "11:00", "13:00", "15:00", "17:00", "19:00", "21:00", "23:00"], note: "單數整點" },
    { name: "巴風特", times: ["14:00", "20:00"] },
    { name: "三王 (13/28/19)", times: ["19:15"] },
    { name: "象塔 8F 惡魔", times: ["22:00"] },
    { name: "黑暗地監 4F", times: ["00:00"] }
];

let remoteWildData = {};
let remoteEventData = {};
let remoteFixedData = {};

// 監聽雲端即時更新
database.ref('wild_bosses').on('value', (snapshot) => { remoteWildData = snapshot.val() || {}; render(); });
database.ref('event_bosses').on('value', (snapshot) => { remoteEventData = snapshot.val() || {}; render(); });
database.ref('fixed_bosses').on('value', (snapshot) => { remoteFixedData = snapshot.val() || {}; render(); });

function handleAction(type, index, isEvent = false) {
    const now = new Date().getTime();
    const config = isEvent ? eventConfig[0] : wildConfig[index];
    const path = isEvent ? 'event_bosses/' + config.id : 'wild_bosses/' + index;
    
    let currentNextSpawn = isEvent ? (remoteEventData[config.id] || 0) : (remoteWildData[index] || 0);

    if (type === 'kill') {
        database.ref(path).set(now + (config.cycle * 60000));
    } else if (type === 'back') {
        let minAgo = prompt(`[${config.name}] 是幾分鐘前殺的？`, "5");
        if (minAgo !== null && !isNaN(minAgo)) {
            database.ref(path).set((now - minAgo * 60000) + (config.cycle * 60000));
        }
    } else if (type === 'skip') {
        let next = (currentNextSpawn === 0 || currentNextSpawn < (now - 86400000)) ? now + (config.cycle * 60000) : currentNextSpawn + (config.cycle * 60000);
        database.ref(path).set(next);
    } else if (type === 'fix') {
        if (currentNextSpawn !== 0) database.ref(path).set(currentNextSpawn - (config.cycle * 60000));
    }
}

function toggleFixed(name, time) {
    let key = `${name}_${time}`.replace(/[.#$/[\]]/g, "_");
    let currentState = remoteFixedData[key] === true;
    database.ref('fixed_bosses/' + key).set(!currentState);
}

function renderRow(boss, nextSpawn, onActionClick) {
    const now = new Date().getTime();
    let diff = nextSpawn - now;
    let isOver = diff < 0;
    let absDiff = Math.abs(diff);
    const h = Math.floor(absDiff / 3600000).toString().padStart(2, '0');
    const m = Math.floor((absDiff % 3600000) / 60000).toString().padStart(2, '0');
    const s = Math.floor((absDiff % 60000) / 1000).toString().padStart(2, '0');
    
    return `
        <div class="boss-row">
            <div class="boss-name">${boss.name} <span style="font-size:10px; color:var(--gray);">(${boss.cycle/60}H)</span></div>
            <div class="next-time">${nextSpawn === 0 ? '---' : new Date(nextSpawn).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
            <div class="countdown ${isOver ? 'status-ready' : 'status-wait'}">${nextSpawn === 0 ? '--:--:--' : (isOver ? '已超過 ' : '') + h + ':' + m + ':' + s}</div>
            <div class="btn-group">
                <button onclick="${onActionClick}('kill')">擊殺</button>
                <button class="back-btn" onclick="${onActionClick}('back')">補登</button>
                <button class="skip-btn" onclick="${onActionClick}('skip')">輪空</button>
                <button class="fix-btn" onclick="${onActionClick}('fix')">修正</button>
            </div>
        </div>
    `;
}

function render() {
    const now = new Date().getTime();
    const eventSection = document.getElementById('event-section');
    
    if (now < EVENT_END_DATE) {
        eventSection.style.display = 'block';
        let next = remoteEventData[eventConfig[0].id] || 0;
        document.getElementById('event-boss-list').innerHTML = renderRow(eventConfig[0], next, `function(type){ handleAction(type, 0, true); }`);
    } else {
        eventSection.style.display = 'none';
    }
    
    document.getElementById('wild-boss-list').innerHTML = wildConfig.map((b, i) => {
        let next = remoteWildData[i] || 0;
        return renderRow(b, next, `function(type){ handleAction(type, ${i}, false); }`);
    }).join('');

    document.getElementById('fixed-boss-list').innerHTML = fixedConfig.map(f => {
        let timeBtns = f.times.map(t => {
            let key = `${f.name}_${t}`.replace(/[.#$/[\]]/g, "_");
            let isDone = remoteFixedData[key] === true;
            return `<button class="time-btn ${isDone ? 'done' : ''}" onclick="toggleFixed('${f.name}', '${t}')">${isDone ? '✓ ' : ''}${t}</button>`;
        }).join(' ');
        return `
            <div class="boss-row" style="grid-template-columns: 2fr 3fr 1.2fr;">
                <div class="boss-name" style="color:var(--fixed)">${f.name}</div>
                <div class="btn-group">${timeBtns}</div>
                <div style="color:var(--gray); font-size:12px;">${f.note || '點擊時段紀錄'}</div>
            </div>
        `;
    }).join('');
}

setInterval(render, 1000);
</script>
</body>
</html>
